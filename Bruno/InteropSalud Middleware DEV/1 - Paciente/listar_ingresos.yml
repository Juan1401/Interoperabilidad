info:
  name: listar_ingresos
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/hl7/lista-ingreso"
  body:
    type: json
    data: |
      {
        "fechaInicio": "2026-03-12", 
        "fechaFin": "2026-03-12",    
        "tipoDocumento": null,       // Opcional, pero te exigirá 'documento' si lo envías
        "documento": null,   // Opcional, pero te exigirá 'tipoDocumento' si lo envías
        "estado": null,                 // Opcional
        "noIngreso": null,        // Opcional
        "atencionMedica": null,          // Opcional (ID del Tipo RDA)
        "claseAtencionFhir": null   // Opcional. Valores: 'EMER' (Urgencias), 'IMP' (Internación), 'AMB' (Consulta Externa).
      }
  auth:
    type: bearer
    token: "{{Token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
