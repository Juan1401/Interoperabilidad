info:
  name: Client Credentials - Obtener Token
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/oauth/token"
  headers:
    - name: Content-Type
      value: application/x-www-form-urlencoded
    - name: Accept
      value: application/json
  body:
    type: form-urlencoded
    data:
      - name: grant_type
        value: client_credentials
      - name: client_id
        value: "{{ID_Client_Credentials}}"
      - name: client_secret
        value: "{{Password_Secret_Cliente_Credentials}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "if (res.getStatus() === 200) {\r

        \    var jsonData = res.getBody();\r

        \    bru.setEnvVar(\"client_access_token\", jsonData.access_token);\r

        \    console.log(\"✅ Client Credentials Token guardado\");\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  **Client Credentials Grant**: Autenticación máquina-a-máquina.

  **Uso:** Para aplicaciones backend que necesitan acceder a la API sin un usuario específico.

  **No retorna refresh_token** (las credenciales del cliente son la "refresh").
