info:
  name: Client_Credentials_Obtener_Token
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/oauth/token"
  params:
    - name: grant_type
      value: client_credentials
      type: query
      disabled: true
    - name: client_id
      value: "{{ID_Client_Credentials}}"
      type: query
      disabled: true
  body:
    type: multipart-form
    data:
      - name: grant_type
        type: text
        value: client_credentials
      - name: client_id
        type: text
        value: "{{ID_Client_Credentials}}"
      - name: client_secret
        type: text
        value: "{{Password_Secret_Cliente_Credentials}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
