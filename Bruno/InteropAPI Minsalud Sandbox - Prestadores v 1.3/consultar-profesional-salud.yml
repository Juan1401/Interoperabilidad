info:
  name: consultar-profesional-salud
  type: http
  seq: 10

http:
  method: POST
  url: "{{APIMurl}}/Practitioner/$consultar-profesional-salud"
  headers:
    - name: Ocp-Apim-Subscription-Key
      value: "{{APIMsubsKey}}"
  body:
    type: json
    data: "/*En los parametros:\r

      - Cambiar Tipo de Identificación (CC) y Número de identificación (0000000)\r

      */\r

      {\r

      \    \"resourceType\": \"Parameters\",\r

      \    \"parameter\": [\r

      \        {\r

      \            \"name\": \"identifier\",\r

      \            \"part\": [\r

      \                {\r

      \                    \"name\": \"type\",\r

      \                    \"valueString\": \"CC\"\r

      \                },\r

      \                {\r

      \                    \"name\": \"value\",\r

      \                    \"valueString\": \"1143131723\"\r

      \                }\r

      \t\t\t]\r

      \t\t}\r

      \        \r

      \    ]\r

      }"
  auth:
    type: bearer
    token: "{{bearerToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
