runtime:
  scripts:
    - type: before-request
      code: "// Get the current date and time\r

        let now = new Date();\r

        \r

        // Clone and subtract 5 hours\r

        let fiveHoursAgo = new Date(now);\r

        fiveHoursAgo.setHours(now.getHours() - 5);\r

        \r

        // Format to ISO string without milliseconds and timezone (e.g. 2025-11-07T14:00:00)\r

        function formatDate(date) {\r

        \    return date.toISOString().split('.')[0] + 'Z';\r

        }\r

        \r

        // Set Postman variables\r

        bru.setEnvVar(\"hora-fin\", formatDate(now));\r

        bru.setEnvVar(\"hora-inicio\", formatDate(fiveHoursAgo));"

