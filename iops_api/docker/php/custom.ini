; ============================================================
; Configuración PHP Personalizada - Interoperabilidad HL7
; ============================================================
; Este archivo extiende la configuración por defecto de la
; imagen php:8.2-apache. Se copia al contenedor durante el
; build del Dockerfile.
;
; CONTEXTO: El flujo del RDA involucra:
;   1. Múltiples consultas a PostgreSQL
;   2. Petición HTTP al SIIS para obtener HTML de Epicrisis
;   3. Generación de PDF con Chromium/Browsershot (puede tardar minutos)
;   4. Envío del Bundle FHIR al Ministerio (IHCE)
;
; Un PDF de epicrisis complejo puede tardar hasta 10 minutos.
; ============================================================

; Tiempo máximo de ejecución de un script PHP (en segundos).
; Default de PHP: 30s — insuficiente para nuestros procesos.
; 900s = 15 minutos de margen para cubrir el peor caso.
max_execution_time = 900

; Tiempo máximo para parsear datos de entrada (POST/GET).
; Default: 60s — lo subimos a 120s por seguridad con payloads grandes.
max_input_time = 120

; Límite de memoria por script.
; Default: 128M — los Bundles FHIR grandes + PDF en Base64 pueden consumir bastante.
memory_limit = 512M

; Tamaño máximo de un POST (debe ser >= upload_max_filesize).
post_max_size = 50M

; Tamaño máximo de archivo subido.
upload_max_filesize = 50M
