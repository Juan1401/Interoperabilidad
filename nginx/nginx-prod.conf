# nginx/nginx-prod.conf
# Proxy Inverso de Produccion - Interoperabilidad HL7
#
# Puerto 80  → enruta por dominio (acceso limpio, sin necesidad de escribir el puerto)
# Puerto 4203 → acceso directo al contenedor frontend (gestionado via docker-compose ports)
# Puerto 8003 → acceso directo al contenedor api     (gestionado via docker-compose ports)

# ─────────────────────────────────────────────────────────────────────────────
# Frontend: http://raziel.fciclubnoel.com  (puerto 80, dominio limpio)
# Proxy interno hacia el contenedor Angular/Nginx en puerto 80
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name raziel.fciclubnoel.com;

    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Soporte WebSocket (por si el contenedor lo requiere)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# Backend API: http://raziel-api.fciclubnoel.com  (puerto 80, dominio limpio)
# Proxy interno hacia el contenedor Laravel/Apache en puerto 80
# Headers correctos para que Laravel Passport reciba la IP real del cliente
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name raziel-api.fciclubnoel.com;

    # Tamano maximo para uploads de archivos
    client_max_body_size 50M;

    location / {
        proxy_pass         http://api:80;
        proxy_http_version 1.1;

        # Headers esenciales para Laravel Passport y validaciones de IP
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;

        proxy_connect_timeout 900s;
        proxy_read_timeout    900s;
        proxy_send_timeout    900s;

        proxy_buffering off;
    }
}
